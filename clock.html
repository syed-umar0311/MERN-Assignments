<!DOCTYPE html>
<html>
<head>
<title>Clock UI</title>
<style>

body{
background:black;
height:100vh;
position:relative;
}

.clock{
width:320px;
height:320px;
border-radius:50%;
background:linear-gradient(to right,#eee 50%,#d9d9d9 50%);
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.num{
position:absolute;
font-size:28px;
font-weight:bold;
}

.n12{top:10px;left:150px;}
.n1{top:30px;right:70px;}
.n2{top:80px;right:25px;}
.n3{top:150px;right:10px;}
.n4{bottom:80px;right:25px;}
.n5{bottom:30px;right:70px;}
.n6{bottom:5px;left:155px;}
.n7{bottom:30px;left:70px;}
.n8{bottom:80px;left:25px;}
.n9{top:150px;left:10px;}
.n10{top:80px;left:25px;}
.n11{top:30px;left:70px;}

.hour{
width:90px;
height:5px;
background:black;
position:absolute;
top:158px;
left:160px;
transform-origin:left;
transform:rotate(210deg);
}

.minute{
width:110px;
height:5px;
background:black;
position:absolute;
top:158px;
left:160px;
transform-origin:left;
transform:rotate(0deg);
}

.second{
width:120px;
height:2px;
background:red;
position:absolute;
top:158px;
left:160px;
transform-origin:left;
transform:rotate(120deg);
}

.center{
width:8px;
height:8px;
background:red;
border-radius:50%;
position:absolute;
top:156px;
left:156px;
}

</style>
</head>

<body>

<div class="clock">

<div class="num n12">12</div>
<div class="num n1">1</div>
<div class="num n2">2</div>
<div class="num n3">3</div>
<div class="num n4">4</div>
<div class="num n5">5</div>
<div class="num n6">6</div>
<div class="num n7">7</div>
<div class="num n8">8</div>
<div class="num n9">9</div>
<div class="num n10">10</div>
<div class="num n11">11</div>

<div class="hour"></div>
<div class="minute"></div>
<div class="second"></div>
<div class="center"></div>

</div>

</body>
</html>
